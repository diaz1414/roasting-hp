<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Twitter -->

    <meta property="twitter:title" content="Roast My Phone 🔥 | Bikin Kena Mental">
    <meta property="twitter:description"
        content="Masukin spesifikasi hape kentang lu, dan siap-siap kena mental di-roasting abis-abisan rata sama AI brutal!">

    <title>Roast My Phone 🔥</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        roast: {
                            500: '#ff3333',
                            600: '#e60000',
                            900: '#0a0000',
                        }
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'gradient-x': 'gradient-x 3s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' }
                        },
                        'gradient-x': {
                            '0%, 100%': {
                                'background-size': '200% 200%',
                                'background-position': 'left center'
                            },
                            '50%': {
                                'background-size': '200% 200%',
                                'background-position': 'right center'
                            }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #1a0505 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #1a0500 0%, transparent 50%);
            overflow-x: hidden;
            color: #f8fafc;
        }

        .glass-panel {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(255, 50, 50, 0.15);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 50, 50, 0.5);
            box-shadow: 0 0 20px rgba(255, 50, 50, 0.2);
            outline: none;
        }

        .text-gradient {
            background: linear-gradient(to right, #ff4d4d, #ff9933);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .stagger-1 {
            animation-delay: 0.1s;
        }

        .stagger-2 {
            animation-delay: 0.2s;
        }

        .stagger-3 {
            animation-delay: 0.3s;
        }

        .stagger-4 {
            animation-delay: 0.4s;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-glow {
            position: relative;
        }

        .btn-glow::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #ff0000);
            z-index: -1;
            border-radius: inherit;
            background-size: 200%;
            animation: gradient-x 3s linear infinite;
            filter: blur(10px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-glow:hover::before {
            opacity: 0.8;
        }

        /* Custom AI Loading Animation */
        .ai-core {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff4d4d 20%, transparent 70%);
            box-shadow: 0 0 30px #ff4d4d;
            animation: pulse-core 1.5s ease-in-out infinite;
            margin: 0 auto;
            position: relative;
        }

        .ai-ring {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 2px solid rgba(255, 50, 50, 0.5);
            border-radius: 50%;
            animation: spin 3s linear infinite;
            border-top-color: transparent;
            border-bottom-color: transparent;
        }

        .ai-ring-2 {
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border: 2px dashed rgba(255, 100, 50, 0.3);
            border-radius: 50%;
            animation: spin-reverse 5s linear infinite;
        }

        @keyframes pulse-core {

            0%,
            100% {
                transform: scale(0.8);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
                box-shadow: 0 0 50px #ff4d4d;
            }
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-reverse {
            100% {
                transform: rotate(-360deg);
            }
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 relative">

    <!-- Ambient Background Blobs -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div
            class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-red-600/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob">
        </div>
        <div class="absolute top-[20%] right-[-10%] w-96 h-96 bg-orange-600/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob animation-delay-2000"
            style="animation-delay: 2s;"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-rose-600/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob animation-delay-4000"
            style="animation-delay: 4s;"></div>
    </div>

    <!-- Toast UI -->
    <div id="toast"
        class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 flex items-center w-[90%] max-w-sm p-4 space-x-4 glass-panel rounded-2xl border border-red-500/50 transition-all duration-500 opacity-0 -translate-y-10 pointer-events-none shadow-[0_10px_40px_rgba(239,68,68,0.3)]">
        <div class="text-red-500 animate-pulse bg-red-500/10 p-2 rounded-full flex-shrink-0">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                </path>
            </svg>
        </div>
        <div id="toastMessage" class="text-sm font-medium tracking-wide text-white">Pesan Notifikasi</div>
    </div>

    <!-- Main Container -->
    <div class="glass-panel p-8 sm:p-10 rounded-[2.5rem] w-full max-w-md relative z-10 fade-in-up mt-8">

        <!-- Header -->
        <div class="text-center mb-10 relative">
            <div class="relative inline-block animate-float">
                <div class="absolute inset-0 bg-red-500/30 blur-2xl rounded-full"></div>
                <img src="./logo.png" alt="Diaww Roasting HP"
                    class="relative w-32 h-32 mx-auto mb-6 rounded-3xl shadow-2xl border border-white/10 object-cover bg-black/50">
            </div>
            <h1 class="text-4xl font-black text-gradient bg-clip-text mb-3 tracking-tight animate-gradient-x p-1">
                Roast My Phone
            </h1>
            <p class="text-slate-400 text-sm font-medium px-4">Siapin mental lu. Masukin spek buat di-roasting AI jaman
                now.</p>
        </div>

        <!-- Inputs Section -->
        <div class="space-y-4">
            <div class="fade-in-up stagger-1">
                <label class="block text-xs font-bold text-slate-400 mb-2 ml-1 uppercase tracking-widest">Merek
                    HP</label>
                <input type="text" id="brand" placeholder="Cth: Xiaomi, iPhone, Samsung..."
                    class="w-full glass-input rounded-2xl p-4 text-white placeholder-slate-600">
            </div>

            <div class="fade-in-up stagger-2">
                <label
                    class="block text-xs font-bold text-slate-400 mb-2 ml-1 uppercase tracking-widest">Tipe/Seri</label>
                <input type="text" id="model" placeholder="Cth: Note 10, 11 Pro..."
                    class="w-full glass-input rounded-2xl p-4 text-white placeholder-slate-600">
            </div>

            <div class="flex gap-4 fade-in-up stagger-3">
                <div class="w-1/2">
                    <label class="block text-xs font-bold text-slate-400 mb-2 ml-1 uppercase tracking-widest">RAM <span
                            class="text-[10px] text-slate-500 lowercase">(GB)</span></label>
                    <input type="number" id="ram" placeholder="4"
                        class="w-full glass-input rounded-2xl p-4 text-white placeholder-slate-600 text-center">
                </div>
                <div class="w-1/2">
                    <label class="block text-xs font-bold text-slate-400 mb-2 ml-1 uppercase tracking-widest">ROM <span
                            class="text-[10px] text-slate-500 lowercase">(GB)</span></label>
                    <input type="number" id="storage" placeholder="64"
                        class="w-full glass-input rounded-2xl p-4 text-white placeholder-slate-600 text-center">
                </div>
            </div>

            <div class="pt-4 fade-in-up stagger-4">
                <button onclick="roastIt()" id="roastBtn"
                    class="btn-glow w-full bg-gradient-to-r from-red-600 via-orange-500 to-red-600 bg-[length:200%_auto] hover:bg-right text-white font-bold py-4 px-4 rounded-2xl transition-all duration-500 transform hover:-translate-y-1 active:scale-95 flex justify-center items-center gap-3 overflow-hidden group">
                    <span class="relative z-10 tracking-widest text-sm uppercase">🔥 Roast Sekarang 🔥</span>
                </button>
            </div>
        </div>

        <!-- Custom Loading State -->
        <div id="loading" class="hidden mt-10 text-center py-6">
            <div class="ai-core mb-8">
                <div class="ai-ring"></div>
                <div class="ai-ring-2"></div>
            </div>
            <p class="text-red-400 text-sm font-bold tracking-widest uppercase animate-pulse">AI Sedang Meracik
                Kata-kata Pedas...</p>
        </div>

        <!-- Result Box -->
        <div id="resultBox"
            class="hidden mt-8 bg-black/40 backdrop-blur-md border border-white/5 border-l-[3px] border-l-red-500 p-6 rounded-2xl text-slate-200 text-sm leading-relaxed shadow-2xl relative overflow-hidden">
            <div
                class="absolute top-0 right-0 w-32 h-32 bg-red-500/10 blur-3xl rounded-full -translate-y-1/2 translate-x-1/2 pointer-events-none">
            </div>
            <div class="relative z-10">
                <p id="roastText" class="font-medium opacity-90"></p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <p
        class="mt-8 mb-4 text-xs font-medium text-slate-500 text-center fade-in-up stagger-4 tracking-wide relative z-10">
        Powered by <span
            class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">Gemini</span>
        <span class="mx-2 opacity-50">•</span>
        Developed by <a href="https://diaww.my.id"
            class="text-white hover:text-red-400 hover:underline transition-colors decoration-wavy underline-offset-4"
            target="_blank">diaww.dev</a>
    </p>

    <script src="env.js"></script>
    <script>
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');

            toastMessage.textContent = message;

            toast.classList.remove('opacity-0', '-translate-y-10');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', '-translate-y-10');
            }, 3500);
        }

        async function roastIt() {
            const brand = document.getElementById('brand').value.trim();
            const model = document.getElementById('model').value.trim();
            const ram = document.getElementById('ram').value.trim();
            const storage = document.getElementById('storage').value.trim();

            const btn = document.getElementById('roastBtn');
            const loading = document.getElementById('loading');
            const resultBox = document.getElementById('resultBox');
            const roastText = document.getElementById('roastText');

            if (!brand || !model || !ram || !storage) {
                showToast("Isi dulu semua spek HP-nya bang!");
                return;
            }

            if (typeof API_KEY === 'undefined' || !API_KEY || API_KEY.trim() === '') {
                showToast("API Key Gemini belum diisi di env.js!");
                return;
            }

            // UI State: Loading
            btn.disabled = true;
            btn.classList.add('opacity-50', 'scale-95', 'pointer-events-none');
            btn.classList.remove('hover:-translate-y-1');

            resultBox.classList.add('hidden');
            resultBox.classList.remove('fade-in-up');

            loading.classList.remove('hidden');

            const prompt = `Kamu adalah seorang stand-up comedian beraliran roasting brutal dan reviewer gadget paling kejam, sarkas, dan toxic (tapi lucu) di tahun 2026. 
            Tolong roasting sepuasnya sampah elektronik dengan spesifikasi berikut: 
            Merek: ${brand}, Tipe: ${model}, RAM: ${ram}GB, Storage: ${storage}GB. 
            JIKA merek atau tipe HP yang dimasukkan terdengar ngarang, palsu, ga jelas, atau bukan HP beneran (misal: nama orang, merk kipas angin, dll), ROASTING dan KATA-KATAIN habis-abisan kelakuan usernya yang halu masukin merk ga jelas!, tapi jangan sebut kata user ya ganti yg lucu.
            Gunakan bahasa Indonesia gaul Jaksel/Gen Z terbaru yang asik, pakai analogi absurd dan punchline ala stand-up comedy yang nyelekit banget sampai bikin owner-nya kena mental. 
            Hina betapa rongsoknya spek ini dipakai di tahun 2026 saat AI udah merajalela, kasih tau kalau hp ini lebih pantas jadi ganjalan pintu atau dilempar ke laut. 
            Maksimal 2 atau 3 paragraf pendek saja. Langsung gas roasting orangnya kayak kamu lagi di panggung!`;

            try {
                // Fetch Gemini 2.5 Flash langsung pakai kunci dari env.js
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                const roastReply = data.candidates[0].content.parts[0].text;

                // Memperindah highlight text bold
                let formattedReply = roastReply.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white bg-red-500/20 px-1 rounded mx-[1px] font-bold">$1</strong>');
                // Format newlines buat paragraf proper
                formattedReply = formattedReply.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');

                roastText.innerHTML = formattedReply;

                loading.classList.add('hidden');
                resultBox.classList.remove('hidden');

                void resultBox.offsetWidth;
                resultBox.classList.add('fade-in-up');

                setTimeout(() => {
                    resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 100);

            } catch (error) {
                console.error(error);
                showToast("Waduh, gagal ngeroast. Cek koneksi internetmu.");
                loading.classList.add('hidden');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'scale-95', 'pointer-events-none');
                btn.classList.add('hover:-translate-y-1');
            }
        }
    </script>
</body>

</html>
