    <link rel="icon" type="image/png" href="logo.png">
    <title>Roast My Phone 🔥</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        roast: {
                            500: '#ef4444',
                            600: '#dc2626',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Animasi Custom */
        .fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glow-effect {
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }

        /* Hilangkan scrollbar tapi tetap bisa scroll */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div id="toast"
        class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 flex items-center w-[90%] max-w-sm p-4 space-x-3 text-slate-200 bg-slate-800/90 backdrop-blur-sm rounded-2xl shadow-2xl border border-red-500 transition-all duration-500 opacity-0 -translate-y-10 pointer-events-none">
        <div class="text-red-500 animate-pulse">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>
        <div id="toastMessage" class="text-sm font-semibold tracking-wide">Pesan Notifikasi</div>
    </div>

    <div
        class="bg-slate-900 p-6 sm:p-8 rounded-3xl shadow-2xl border border-slate-800 w-full max-w-md relative overflow-hidden z-10">

        <div
            class="absolute -top-20 -right-20 w-40 h-40 bg-red-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20">
        </div>
        <div
            class="absolute -bottom-20 -left-20 w-40 h-40 bg-orange-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20">
        </div>

        <div class="text-center mb-8 relative z-10">
            <img src="./logo.png" alt="Diaww Roasting HP"
                class="w-28 h-28 mx-auto mb-4 rounded-2xl shadow-xl border-2 border-red-500/30 object-cover glow-effect hover:scale-105 transition-transform duration-300">
            <h1
                class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-red-500 to-orange-400 mb-2">
                Roast My Phone 🔥
            </h1>
            <p class="text-slate-400 text-sm">Masukin spek HP kamu, siap-siap kena mental sama AI.</p>
        </div>

        <div class="space-y-4 relative z-10">
            <div>
                <label class="block text-xs text-slate-400 mb-1 ml-1 uppercase tracking-wider">Merek HP</label>
                <input type="text" id="brand" placeholder="Cth: Xiaomi, iPhone, Samsung..."
                    class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white placeholder-slate-500 focus:ring-2 focus:ring-roast-500 focus:border-transparent outline-none transition duration-300">
            </div>

            <div>
                <label class="block text-xs text-slate-400 mb-1 ml-1 uppercase tracking-wider">Tipe/Seri</label>
                <input type="text" id="model" placeholder="Cth: Redmi Note 10, 11 Pro..."
                    class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white placeholder-slate-500 focus:ring-2 focus:ring-roast-500 focus:border-transparent outline-none transition duration-300">
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="block text-xs text-slate-400 mb-1 ml-1 uppercase tracking-wider">RAM (GB)</label>
                    <input type="number" id="ram" placeholder="Cth: 4"
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white placeholder-slate-500 focus:ring-2 focus:ring-roast-500 focus:border-transparent outline-none transition duration-300">
                </div>
                <div class="w-1/2">
                    <label class="block text-xs text-slate-400 mb-1 ml-1 uppercase tracking-wider">Storage (GB)</label>
                    <input type="number" id="storage" placeholder="Cth: 64"
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white placeholder-slate-500 focus:ring-2 focus:ring-roast-500 focus:border-transparent outline-none transition duration-300">
                </div>
            </div>

            <button onclick="roastIt()" id="roastBtn"
                class="w-full mt-4 bg-gradient-to-r from-red-600 to-orange-500 hover:from-red-500 hover:to-orange-400 text-white font-bold py-4 px-4 rounded-xl transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] glow-effect flex justify-center items-center gap-2">
                <span>🔥 ROAST SEKARANG 🔥</span>
            </button>
        </div>

        <div id="loading" class="hidden mt-8 text-center fade-in-up">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-red-500 mb-2"></div>
            <p class="text-slate-400 text-sm animate-pulse">AI sedang meracik kata-kata pedas...</p>
        </div>

        <div id="resultBox"
            class="hidden mt-6 bg-slate-800/50 border border-slate-700 p-5 rounded-xl text-slate-200 text-sm leading-relaxed border-l-4 border-l-red-500 fade-in-up">
            <p id="roastText"></p>
        </div>
    </div>

    <p class="mt-6 text-xs text-slate-500 text-center">Powered by Gemini | Developed by <a href="https://diaww.my.id"
            class="text-slate-400 hover:text-white transition" target="_blank">diaww.dev</a></p>

    <script>
        // API KEY KAMU DI SINI (Diapit tanda kutip)
        const API_KEY = 'AIzaSyApoyqBBVYWYSh-yZK43RcXtLDmJM8wJCM';

        // Fungsi untuk menampilkan custom notifikasi
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');

            toastMessage.textContent = message;

            // Munculkan toast
            toast.classList.remove('opacity-0', '-translate-y-10');
            toast.classList.add('opacity-100', 'translate-y-0');

            // Sembunyikan otomatis setelah 3.5 detik
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', '-translate-y-10');
            }, 3500);
        }

        async function roastIt() {
            const brand = document.getElementById('brand').value.trim();
            const model = document.getElementById('model').value.trim();
            const ram = document.getElementById('ram').value.trim();
            const storage = document.getElementById('storage').value.trim();

            const btn = document.getElementById('roastBtn');
            const loading = document.getElementById('loading');
            const resultBox = document.getElementById('resultBox');
            const roastText = document.getElementById('roastText');

            // Validasi Input pakai Custom Toast
            if (!brand || !model || !ram || !storage) {
                showToast("Isi dulu semua spek HP-nya bang!");
                return;
            }

            // Pengecekan API Key
            if (!API_KEY || API_KEY.trim() === '') {
                showToast("API Key Gemini belum diisi di script!");
                return;
            }

            // UI State: Loading
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            resultBox.classList.add('hidden');
            resultBox.classList.remove('fade-in-up');
            loading.classList.remove('hidden');

            // Prompt untuk AI
            const prompt = `Kamu adalah seorang stand-up comedian beraliran roasting brutal dan reviewer gadget paling kejam, sarkas, dan toxic (tapi lucu) di tahun 2026. 
            Tolong roasting sepuasnya sampah elektronik dengan spesifikasi berikut: 
            Merek: ${brand}, Tipe: ${model}, RAM: ${ram}GB, Storage: ${storage}GB. 
            JIKA merek atau tipe HP yang dimasukkan terdengar ngarang, palsu, ga jelas, atau bukan HP beneran (misal: nama orang, merk kipas angin, dll), ROASTING dan KATA-KATAIN habis-abisan kelakuan usernya yang halu masukin merk ga jelas!, tapi jangan sebut kata user ya ganti yg lucu.
            Gunakan bahasa Indonesia gaul Jaksel/Gen Z terbaru yang asik, pakai analogi absurd dan punchline ala stand-up comedy yang nyelekit banget sampai bikin owner-nya kena mental. 
            Hina betapa rongsoknya spek ini dipakai di tahun 2026 saat AI udah merajalela, kasih tau kalau hp ini lebih pantas jadi ganjalan pintu atau dilempar ke laut. 
            Maksimal 2 atau 3 paragraf pendek saja. Langsung gas roasting orangnya kayak kamu lagi di panggung!`;

            try {
                // Link dikembalikan ke gemini-1.5-flash
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                const roastReply = data.candidates[0].content.parts[0].text;

                // Hapus format markdown asterisk agar rapi di HTML
                roastText.innerHTML = roastReply.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white">$1</strong>').replace(/\n/g, '<br>');

                // Tampilkan hasil
                loading.classList.add('hidden');
                resultBox.classList.remove('hidden');
                void resultBox.offsetWidth;
                resultBox.classList.add('fade-in-up');

            } catch (error) {
                console.error(error);
                showToast("Waduh, gagal ngeroast. Cek koneksi internetmu.");
                loading.classList.add('hidden');
            } finally {
                // UI State: Reset Button
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>

</html>
